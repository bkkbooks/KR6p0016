front:
  text: 阿彌陀經句解序夫同生五濁念佛勤求出離苟非解法逗根何以頓釋疑情而獲大受用余寓德藏琅函閣適正宗上人出元稟天台妙觀越溪澄師句解佛説阿彌陀經一帙集緣梓行遂一披閲開卷了然雖云至簡至易即此可以融通至奧至深昔清涼判華嚴為極談天台標法華最無上然二經皆以淨土終焉至永明延壽禪師嗣法眼之宗著宗鏡録一百卷研窮禪髓復立四料簡懇懇以淨土為歸因斯流通快覩廬山遠公蓮灟遍注寰區如曰徹法遡源詳具智者大師玄義等諸詮正宗始自太虗師開發以清象先為兄又參依妙峯法師有年波瀾授受的非孟浪雖然解誠妙矣傳更廣矣惟願導之者忍耐洞達既不失之縱習氣以動正念又不失之蓄纖疑以茁業根轉娑婆而為極樂特在伸臂間爾頃因問序直以忠讜諗之云萬曆甲申圓通成道日方道成熏沐百拜撰
