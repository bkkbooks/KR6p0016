body:
  text: 佛説阿彌陀經越溪沙門性澄句解夫天台釋經以五章釋總題三分分經文總別相須教觀可識此經以單人為名實相為體勸修行願為宗捨苦得樂為用生酥大乘為教相第一釋名者諸經皆有通別二名通則經之一字別則有七單三復三具足者一今經乃屬單人佛即此土教主能説釋迦之通名阿彌陀即彼土教主所説彌陀之別號經同一化故為通也初別名者梵語佛陀此翻覺者又翻知者智論云知三世衆生數非衆生數常無常等一切諸法菩提樹下了了覺知故名為佛説者悅也孤山云得機設教稱悅佛懷故阿彌陀翻無量壽佛有三身謂法報應一法身者師軌法性以法為身二報身者修行感報以如如智照如如境也三應身者應同萬物為身也三義皆有身壽量三今言其量必攝前二無量者此是應身其實有量但其壽長人天莫數故云無量具如法華文句四句分別云云然佛之三身三壽三量不可並別一異法體融妙即一而三即三而一也次通名者梵語修多羅此翻契經契理契機故訓法訓常十界同遵三世不易故言經也第二辨體者即一實相為經正體無量功德共莊嚴種種衆行之歸趣言説問答而詮辨譬衆星之環北辰如萬派之宗東海故以實相為經體也第三明宗者此經以勸修行願為宗由佛無問自説不待發起故曰勸修言行願者淨土之行要在於願如此土人稟教修行無往生願多致退屈故佛勸云衆生聞者應當發願生彼國土故以行願為宗也第四論用者用謂力用此經以捨苦得樂為用以欣厭二門依經修習能捨娑婆之衆苦得安養之極樂斯經力用其在茲焉第五判教相者此經部屬生酥大乘教攝二藏明義菩薩藏收四教修法正意在圓而通被四教之機乃至博地凡夫稱名願生皆獲果遂蓋部屬方等調機入頓故機雖有四教自是圓權巧方便其妙若此淨名略記云三藏教中無淨土教通別二教猶非正意秪可泛論以為格量文或問教既是圓前三教人如何用觀答雖未能稱性繫念以回向發願求生之心即是圓心雖被四機同一願行此經凡有兩譯一什師即今本也二唐奘師譯名稱讚淨土佛攝受經釋題竟姚秦三藏法師鳩摩羅什奉詔譯秦有四今云姚秦即後秦姚氏也鳩摩羅翻童壽什是華言以深善此方文字之什得名本丘慈國人後秦弘始三年入長安譯經論凡九十八部合四百二十一卷位證三賢南山感應傳云七佛已來譯經師也初序分六初所聞法體如是經前六事名證信序如來滅後阿難結集奉教安列以為證信如是者指下一經所聞法體也天台云諸法實相古今不異名如如理而説名是四明云四教言理皆稱如是而有淺深唯圓初心即了諸法一一中實當處皆如稱理而談無非曰是二舉能持人我聞阿難無見我慢我為傳化不絶順俗立名字我指如是之法我親從佛而聞也三聞持和合一時如來説法機應和合會在一時天台云今不論長短説此經竟總為一時也四明化主佛此云覺者自覺覺他覺行圓滿一切智異外道慈悲異二乘平等異小菩薩尊極名為佛五論住處在舍衛國祇樹給孤獨園舍衛翻聞物謂具足欲塵財寶物多聞解脫人也祇樹即祇陀太子所施之樹給孤獨園乃須達多長者側布黃金從太子所買之園祇陀翻戰勝波斯匿王之子須達多翻善勝祇陀施樹長者買園共造伽藍請佛供養故云祇樹給孤獨園也六列同聞三初聲聞六初明類與大比丘僧與者共也今經阿難與衆同聞故云共也大有三義謂大多勝天王大人所敬故大遍解內外經書名多出九十五種上故號勝此等無學小乘中極故云大也比丘翻乞士又破惡又怖魔僧者具云僧伽此翻衆和合也二列數千二百五十人俱三迦葉兄弟有千弟子身子目連共二百五十人此等先並事火艱苦纍載都無所獲翻邪入正一遇見佛便得上果感佛深恩常隨侍佛為同聞衆三明位皆是大阿羅漢阿羅漢含三義一應供為人天福田此乃乞士之果也二殺賊斷盡煩惱故此乃破惡果也三無生不受後有故此乃怖魔之果也四歎德衆所知識天台云聞名欽德名知觀形敬奉為識或云見形為知見心為識或云知即是識五列名長老年高臘長學解廣深故通貫下文十六尊者也舍利弗翻身子母好形身身之所生故云身子又翻珠子其母聰明相在眼珠以子顯母為作此名七歲登議論床十六大國議論無雙至佛所七日遍達佛法得阿羅漢摩訶目犍連摩訶翻大目犍連姓也翻讚誦神通第一摩訶迦葉此云大龜氏其先代學道靈龜負仙圖而應從德命族真諦翻飲光迦葉身光能映物故頭陀苦行最為第一摩訶迦旃延此翻文飾善分別義敷演第一摩訶俱絺羅此翻大膝舍利弗舅增一云得四辨才觸難能答第一離婆多此翻星宿父母從星辰乞子既其感獲因星作名周利槃陀伽亦名槃特此云路邊生母懷孕還家路邊誕子因名路邊出家以愚暗時久都無所解兄槃陀伽先入道怪曰徒淹歲月全無知會遣歸俗舍弟倚寺門嗟嘆流涕佛見令付掃帚每日誦習記一忘一後乃省悟掃帚除穢令淨為義佛令我除斷身中惑垢也因茲證果難陀此云善歡喜淨飯王逼十萬釋出家即一人也阿難陀此云歡喜淨飯王太子出家成佛王大歡喜白飯王奏云生子舉國欣欣因名歡喜二十五為佛侍者侍佛二十五年佛所説法記憶不忘羅睺羅此云覆障太子求出家父王不許殷勤不已王言汝若有子聽汝出家菩薩以指指妃腹却後六年汝當生子在胎六年故言覆障佛索出家父王不許耶輸將上高樓目連飛空來取佛度出家既出家已王位亦失故言覆障憍梵波提此云牛呞音寺增一云昔五百世曾為牛王牛若食後恆事虗哨餘報未夷唼唼常嚼時人稱為牛呞賓頭盧頗羅墮上是名翻不動下是姓翻捷疾奈耶律云樹提長者以旃檀鉢置於剎上告云有神通能取便與尊者騁通取之佛呵責已云汝自今後不得入滅留身久住受請應供今時齊會所供聖僧是也迦留陀夷此云粗黑顏色因夜行乞食人驚戒禁夜行乞食摩訶劫賓那此云房宿父母禱房宿感子因名房宿又初出家未見佛始向佛所值雨寄食陶師家後比丘來共宿即是佛聞法得道從得道處為名也薄拘羅此翻善容色貌端正故言善容年一百六十歲無病不夭有五不死報母置熬盤釜中水中魚食刀破皆不死昔持不殺戒故九十一劫命不中夭阿䨲樓陀亦云阿那律此云無貧是解飯王次子出家多睡佛乃呵責七日七夜眼睫不交因喪肉眼佛令求天眼增一云我佛法中天眼那律第一六總結如是等諸大弟子學在師後稱弟解從師生稱子弟則顯師謙讓子乃明資尊仰二菩薩三初明類并諸菩薩摩訶薩天台云具存云菩提薩埵什師嫌煩略提埵二字菩提翻道薩埵翻心摩訶翻大此諸人等皆求廣博大道又能成熟衆生是大道心之氣類故云諸菩薩等二列名文殊師利此翻妙德又妙吉祥法王子大論云佛為法王菩薩入正法位乃至十地悉名法王子荊溪云文殊稱法王子此諸菩薩何人非法王子答有二一於王子中德推文殊二諸經中文殊並為菩薩衆首文阿逸多菩薩阿逸多名也翻無勝彌勒姓也翻慈氏乾陀訶提菩薩此翻不休息行諸梵行過恆河沙劫然後授記心不休息故常精進菩薩寶積經云是菩薩為一衆生經無量劫隨逐不捨猶不受化無一念棄捨以身心俱進名常精進天台云常精進者見法性常住成無作正勤二總結與如是等諸大菩薩靈芝云菩薩名通初後如上莫非深位補處或權現影響故稱大也三雜衆及釋提桓因等無量諸天大衆俱釋提桓因翻能作能作忉利欲界天主三界天衆甚多故云無量更兼道俗四衆天龍八部故云大衆俱若據結文既云一切世間則何趣不攝耶二正宗分三此下依慈雲科初廣讚依正引物欣求二初廣讚二報二初標列所讚爾時佛告長老舍利弗爾時者機應和合佛初説經之時也告舍利者經家敘對告人也不告菩薩天龍者淨覺云應有四悉意一是左面弟子大小法集多居其首故二由智慧第一四衆八部罔不欽仰故三為令四衆聞佛淨土自鄙絶分故四復欲小乘未取證者回心向大故佛凡説法必獲四悉檀益從是西方過十萬億佛土一佛土是大千界即過十萬億大千界也或問淨土既居十萬億剎之外衆生一念安得往生曰有二義故一者衆生念力十疑論云但使衆生淨業成就臨終在定之心即是淨土受生之心動念即是生淨土時如人有夢身雖在床而心意識遍至他方生淨土亦爾動念即至不須疑也二者如來願力四十八願經云設我成佛十方衆生至心信樂欲生我國乃至十念若不生者不取正覺然此二義不出感應皆由衆生心性本具塵剎雖十萬億之遙無非性具此心如帝網之一珠影含衆珠如大海之一浪具全潮體非但互具亦乃互即故四明云若心性不具塵剎則生無感見之功佛無應現之理有世界名曰極樂極樂者對此娑婆極苦而得名也或問四土各有淨穢天台云五濁輕重同居淨穢體析巧拙方便淨穢次第頓入實報淨穢分證究竟寂光淨穢今云極樂於四種中何淨土耶答答所談依正屬同居淨土若衆生念力淺深不同如病須藥本為身安求得仙方修合服之不但身安兼得輕骨身安可喻生同居淨土輕骨可喻感上三土又復散心稱念雖則多感同居淨土既生彼國任運增進感上三土亦義通四種淨土也其土有佛號阿彌陀今現在説法佛有三身名法報應荊溪云法定不説報通二義應化定説今言説法即是應身然淨土教主有二不同如觀經所説佛身高六十萬億那由他由旬乃他報尊特勝應身也三十二相八十隨形好丈六身佛乃劣應身也勝應之身乃圓七信之所感見今經通被四機正是劣應常所見身繫念稱名心存目想為所對境圓名字人雖知佛身全法界作而見思尚熾事識彌隆所見佛身無非劣應圓人尚爾況前三教若五品人能以一心三觀圓伏五住煩惱雖未能見六十萬億勝應尊特之身以三十二相常所見身相相達無邊故也二正讚依正二初讚依果四初珠網瓊林舍利弗彼土何故名為極樂初且徵名其國衆生無有衆苦但受諸樂故名極樂總釋名義又舍利弗極樂國土七重欄楯寶樹周圍有七重欄楯也橫曰欄竪曰楯欄檻也莊嚴寶樹繞圍華叢七重羅網瑞相經云無量寶網皆以金縷珍珠百千雜寶奇妙珍異莊嚴校飾周匝四面垂以寶鈴光色異曜盡極嚴麗羅覆樹林七重行樹七重寶樹行列國中長開異華更無凋瘦皆以四寶周匝圍繞是故彼國名為極樂四寶者金銀琉璃玻璃也慈恩云欄楯羅網行樹各有七重者表生彼國得七覺支故身口七支無諸過故有七聖財故靈芝云凡佛菩薩居處皆然非謂一國只有七重耳二寶池蓮華又舍利弗極樂國土有七寶池彼國有八池七寶所成池中之水亦七寶色八功德水充滿其中八德者天台云一輕二清三冷四軟五美六不臭七飲時調適八飲已無患清是色入不臰是香入輕軟冷是觸入美是味入調適無患是法入故四明云八德而對五入水流説法即聲入雖成六入無非妙境故令行者速證無生諸疏所列八德依稱讚淨土經列法相少不同經中輕軟為一天台開為二經中開潤澤安和二天台合一不臭恐諸譯不同今且依天台所列池底純以金砂布地觀經去渠下皆以雜色金剛以為底砂四邊階道金銀琉璃此云不遠以西域有此山至波羅奈城不遠山出此寶故以名之玻璃合成亦云頗胝迦此云水玉或云水精上有樓閣亦以金銀琉瑙玻璃𤥭璖如大車之渠故曰車磲謂車輞也赤珠佛地論云赤蟲所出大論云真珠出魚腹中或竹中或蛇腦中不必唯生蚌胎也碼瑙此寶色如馬之腦因為其名而嚴飾之然衆寶且就此土釋其所出淨土乃自然而有者池中蓮華大如車輪靈芝云車有大小難為定準此方極大不過數尺可依輪王為量十住婆沙云輪王千輻金輪種種珍寶莊嚴其輞琉璃為轂周圓十五里準此未及半由旬亦約小者耳或問觀經云一一池中有六十億七寶蓮華團圓正等十二由旬何與今經優劣不同耶曰觀經蓮華是第四觀觀力稍著行者到此已能圓伏五住當五品初心所見豈比今經通被散心衆生欣樂求生之境大本云池中蓮華或一由旬乃至百千由旬亦是被四教機約機所見故有一由旬乃至百千之不同也夫佛之依正本無數量約機淺深所見高下耳四明云大本中説佛所浴池廣四萬八千里小本蓮華大如車輪鼓音王等經説安養依正雖淨雖勝但與娑婆分於五濁輕重而已豈比觀經專明妙觀所顯法身尊特身量相好逈拔非常耶青色青光黃色黃光赤色赤光白色白光微妙香潔此列蓮華色香也舍利弗極樂國土成就如是功德莊嚴四十八願經云彼佛於大衆建此願已一向專志莊嚴妙土等功德者有功之德也功收願行德歸三諦下文皆然三天樂裓衣又舍利弗彼佛國土常作天樂觀經云無量樂器懸處虗空不鼓自鳴或林或幢皆懸樂器悉自和鳴隨衆生意皆奏法音人天聞者俱發道心或歌六度或讚三乘黃金為地準觀經彼國以琉璃為地以黃金繩雜廁間錯兼以七寶界其分齊今言黃金乃地面莊嚴耳晝夜六時雨天曼陀羅華彼國光明常照無日月光準大本經彼以華開鳥鳴為曉蓮合鳥棲為夜曼它羅此翻適意又翻白華其土衆生常以清旦各以衣裓盛衆妙華衣裓者真諦云外國盛華器也供養他方十萬億佛蓋遊歷十方佛前聞法進登深位也此據生彼破惑得道人言若未破惑未必能也如觀經九品唯上三品皆云遊歷十方中三品下三品皆不云遊歷未破惑故也即以食時還到本國飯食經行飯食者大本云宮殿衣服飯食猶第六天自然之物若欲食時七寶應器自然在前百味飲食自然盈滿雖有此食實無食者但見色聞香自然飽足食已化去時至復現也舍利弗極樂國土成就如是功德莊嚴四化禽風樹二初化禽二初列復次舍利弗彼國常有種種奇妙雜色之鳥白鶴孔鸚鵡此三可曉舍利此云春鶯或翻鶖鷺迦陵頻伽此云妙聲在㲉中其音已起衆鳥共命之鳥兩首一身異神識同報命故名共命法華經名命命是諸衆鳥晝夜六時出和雅音其音演暢和雅謂音聲悅人演暢謂説法無滯五根五力五根謂信進念定慧也能生名根五根增進堪任排障故曰五力七菩提分菩提翻覺分亦支也謂念擇進喜輕定捨八聖道分諸經或云八正道謂正見正思惟正語正業正精進正定正念正命如是等法慈恩云三十七道品文缺四念處四正勤四如意足三科以等字兼之其土衆生聞是音已皆悉念佛念法念僧孤山云念佛如醫王念法如良藥念僧如瞻視人三者既備則煩惱之病可瘥也此念別相三寶又觀自心寂而常照則諸法炳然名念佛照而常寂無法可得名念法寂照不二即存而亡亡存和合名念僧此同體三寶也古崖云道品三寶皆通四教隨機各解二釋疑舍利弗汝勿謂此鳥實是罪報所生恐身子心疑既有雜鳥則有畜趣此三惡道之一何名淨土耶所以者何彼佛國土無三惡道大本法藏願云設我成佛國土有地獄畜生餓鬼者不取正覺舍利弗其佛國土尚無惡道之名何況有實大本云彼國無有三途苦難之名但有自然快樂之音是故其國名曰安養是諸衆鳥皆是阿彌陀佛欲令法音宣流變化所作此增廣化事也豈唯珍禽説法抑亦風樹水聲皆演妙音若非衆生性具安能果上色心互融依正皆妙二風樹舍利弗彼佛國土微風吹動諸寶行樹及寶羅網出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心諸寶樹等即前七重樹網風動成音準觀經水流成音演説苦空無常無我諸波羅蜜驗此樹音無不演法否則可令國中衆生聞音皆生念佛念法念僧之心耶舍利弗其佛國土成就如是功德莊嚴二讚正報二初讚化主舍利弗於汝意云何彼佛何故號阿彌陀審問別號既無所對故為釋通舍利弗彼佛光明無量照十方國無所障礙是故號為阿彌陀梵語阿彌陀此翻無量一光明無量二壽命無量義如經列或問只一梵語何翻二義私謂彌陀法身體德明靜寂而常照故光而明照而常寂故靜而壽光即般若壽即解脫即一而二即二而一法相融妙故得經中二義釋之初無量光者大本云無量壽佛威神光明最尊第一諸佛光明所不能及是故號為無量光佛又舍利弗彼佛壽命及其人民無量無邊阿僧祇劫故名阿彌陀二無量壽者大本云彼佛壽命長久不可稱計假使十方無量衆生皆成聲聞緣覺都共集會竭其智力百千萬劫悉共推算不能窮盡又云聲聞菩薩人天之衆壽命長遠亦復如是阿僧祇此云無數然約光壽雖稱無量乃是三十二相常所見身與觀經勝應尊特身不同舍利弗阿彌陀佛成佛以來於今十劫今經部屬方等乃是一時赴機之説若依法華顯本必長以迹門所説彌陀既在十六王子之數釋迦本門開顯壽量塵劫彌陀顯本壽亦難思也二讚眷屬二初列三乘又舍利弗彼佛有無量無邊聲聞弟子皆阿羅漢阿羅漢揀異前三果也不言緣覺攝在聲聞數中亦可以弟子二字總收三乘也非是算數之所能知諸菩薩衆亦復如是聲聞兼藏通兩教菩薩則通四教或問今經正意在圓何關二乘耶曰彼佛為慣習小者成就小果示聲聞法然後引小入大或問往生論云二乘種不生何耶天台云正處小行不生要由臨終發大乘種亦乃得生以先學小故至彼聞苦空無常發其本解先證小果證已不住於小必還入大舍利弗彼佛國土成就如是功德莊嚴靈芝云此亦彌陀所化來生彼國修因證果為國莊嚴二生不退又舍利弗極樂國土衆生生者皆是阿跋致衆生亦可義通九品阿跋致云不退轉十疑論云彼國有五因緣故不退一彌陀願力攝持二佛光常照三水鳥樹林常演説法四純諸菩薩為友五壽命永劫其中多有一生補處其數甚多非是算數所能知之但可以無量無邊阿僧祇説若此娑婆生彼土者多未破惑不論位次如前云五種因緣故得不退若到彼已聞法入真方可論位行念三不退也若不爾者文云多有一生補處豈此土初生之人便登等覺耶一生補處如觀音勢至位鄰妙覺次補佛處無量無邊亦顯其多也廣讚依正竟二勸修願行二初願舍利弗衆生聞者應當發願願生彼國勸修行願正明一經宗要願行本一今先願後行者揀異此土行人稟教修行無往生願故於此土聞法入真多致退失故須先願夫願有總有別菩薩多發四弘及總願也今求生淨土乃別願也以此土塵境粗強聖果難成願生淨土速證菩提所以者何得與如是諸上善人俱會一處諸上善人指上三乘聖衆欲顯此土三惡充滿皆不善聚為可厭耳一處者古崖云雖是同居淨土指此無非寂光理土而此寂光全是衆生三德理藏不指此藏何得名一處哉二行四初揀勉舍利弗不可以少善根福德因緣得生彼國少善根等者此土四教修行之人若無正信回向發願求生淨土皆名為少少之一字貫下二句亦云少福德少因緣善根明正行福德約助行如觀經云欲生彼國當修三福一者孝養父母奉事師長慈心不殺二者受持三歸具足衆戒三者發菩提心深信因果讀誦大乘等乃至立寺造像禮誦坐禪懺念若行一切福業皆助行也因緣二字總結正助正行為因助行為緣也下科經文但明正行不明助行者蓋文義互現譯人之巧耳或問此土修圓頓者亦名少善根耶曰娑婆縱稟圓頓修行亦多退失若不求生淨土亦名善根涼薄故勉進須求生也二正明行舍利弗若有善男子善女人即能修之機該乎四教及博地凡夫聞説阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂此正明修行應有三意初明所念境二正明繫念三制明限初意者先須了知彌陀世尊雖居十萬億剎之外全我一心本具但為久迷背於本性今欲稱念正為顯自心性此之心性不出三諦妙境故果上所顯三身四土不離心性故經聞説阿彌陀佛若不因聞妙解本具則佛從外來是因緣法二正明繫念者經云執持名號即繫念聖號也言一心不亂者有事一心有理一心初事者先須斂念面向西方合掌正身遙想彼佛丈六金容三十二相八十種好現坐道場依正莊嚴光明無量自慨此身久沉苦海漂流生死孤露無依譬如嬰兒墮在坑穽叫呼父母急救危亡一志依投懇求免脫聲聲相續念念不移感佛哀憐此心專注不為塵緣之所擾亂故曰一心不亂二理一心者體達事中一心稱名能念之心本無自性所念之佛當體空寂聲相亦空呼響不實所稱能稱既絶思議皆不可得名為即空雖即本空而我此心能成妙感彌陀妙應全心所現如水不上升月不下降感應道交任運顯益名為妙假假不定假空亦非空空假不二顯於中道由此心性是毗盧體體非能所亦非形相非不形相名為即中中以不偏為義絶待為功既無待對空假叵得中道不存不一不異思議泯亡故名一心不亂又分字解者圓觀妙境三諦皆空三諦皆假三諦皆中體既無異故曰一心雖則本融空彰蕩相假彰立法中彰絶待於一心中有三德用不可混雜故曰不亂如是觀念圓修三觀圓念三身圓破三惑圓證三德豈但得生同居淨土亦能分證寂光理體但觀有微著念力偏強惑有厚薄故成觀行相似分證之殊又復此文非但明於一念事理亦顯一心三慧具足如云聞説阿彌陀佛執持名號聞即聞慧執謂執受在心即是思慧持謂任持不忘即是修慧即聞而思二慧導行任持不失故於一心顯圓三慧若無聞慧無受潤因聞而不思無深旨趣思而不修終無證理三慧若備得道不疑三明期限者利根一日鈍或至七故言若一日二日等七日行成縱未破惑定為往生之因又此一心不亂之句文有兩屬若論正明觀法一經唯指此句若論行成功顯亦指此之一句以淨業既成故我一心不為煩惑所亂得感臨終往生故曰臨命終時等則屬下科得果也或問四教人稱名前三如何能修三觀曰前三稱名唯得事中一心則屬散善若圓人稱名非但事理俱得亦顯事理不二則屬定善前三但以回向發願得往生耳三得果其人臨命終時阿彌陀佛與諸聖衆現在其前行者臨終以修願行定力所持感佛來迎亦是彌陀大願願力攝受大本云十方衆生至心發願欲生我國臨命終時假令不與大衆圍繞現在其前者不取正覺靈芝云聖衆現前亦有多別或真佛化佛觀音勢至隨其品位委在觀經或謂臨終見佛以為魔者或謂自心業現無他佛來者斯蓋不知生佛一體感應道交自障障他為過不淺矣是人終時心不顛倒即得往生阿彌陀佛極樂國土靈芝云凡人臨終識神無主善惡業行無不發現或起惡念或起邪見或生貪戀或發猖狂惡相非一皆名顛倒因前誦習罪滅障除淨業內熏慈光外攝脫苦得樂一剎那間頓超樂土下文勸生其利在此四結勸舍利弗我見是利故説此言若有衆生聞是説者應當發願生彼國土此經無發起序不同他經當機辨道乃無問自説故云我見是利故説此言如竹菴云不待發起如急救法也應當發願淨土之行要在於願故重叮嚀二六方引同敦勉生信二初引同二初釋迦讚歎舍利弗如我今者讚歎阿彌陀佛不可思議功德之利欲明六方同讚先結釋迦稱揚故云如我今者等功德不可同福德之名福德屬事功德屬理有功之德故曰功德功收願行德歸三諦若不爾者安云不可思議耶前文頻云功德莊嚴當依此釋二諸佛讚歎六初東方東方亦有阿閦佛唐譯具有十方秦譯略明六方亦有者領上之詞非但我釋迦稱讚十方諸佛亦現稱讚諸佛別名靈芝云相承不釋今以義詳或從色相或取言音或約行業或從譬喻大略不出果德三身收無不盡文或偏舉義必兼含古崖云凡釋經必約教觀二義不約教則不識能詮之名被機之相不約觀則如貧數寶於我何為如約教先明因緣事相考尋經論所出及法門表對之義釋之阿閦此云不動不為二邊而動故須彌相佛大須彌佛須彌光佛須彌翻妙高妙則三德圓融高則超過因位相與大並表解脫斷德光表般若智慧也妙音佛語音圓妙説法稱機立名諸佛雖三身一體皆以應佛當名如是等恆河沙數諸佛恆河亦云殑伽河其沙多而細佛近彼河説法諸經故多引喻各於其國出廣長舌相遍覆三千大千世界慈恩云舌相廣長表無量劫口離四過凡證小事即覆面門以至髮際今覆大千證大事故或問此勝應耶劣應耶曰若論現相只表所説不虗不可以舌驗身然必是勝應尊特也説誠實言汝等衆生當信是慈恩云觀此經勢蓋他方諸佛告自國聽衆釋迦轉引彼佛意言證彼西方令此會衆生信敬也靈芝云正當釋迦説此經時十方諸佛同時勸讚令信是經然二師之義皆通靈芝尤得經旨稱讚不可思議功德一切諸佛所護念經此十六字是舉經題唐譯依此題名稱讚淨土佛攝受經不可思議者文中有四不可思議一者依報雖是同居淨土此用即體無非寂光二者正報雖是應身指應即法三者修因四者感果七日持名即感聖果因果不二亦不思議故今唱題名不可思議功德也又此一題示五章義何者不可思議即是經體願行功德即是宗要諸佛護念即是力用護故捨苦念故得樂總此三義即是釋名稱讚此四即當教相二南方舍利弗南方世界有日月燈佛名日月燈表於三智名聞光佛名稱普聞如光遍照大𦦨肩佛肩表二智𦦨表照理須彌燈佛須彌是衆山之王自證之體燈表化他之用無量精進佛從行為名方便度生未嘗暫懈衆生無量悲智亦然如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經三西方舍利弗西方世界有無量壽佛慈恩云儒宗尚不自伐其善何故彌陀自讚難思答據文勢即是諸佛稱讚又設若彌陀自讚於理何違引轉衆生令生勝意靈芝云同名甚多決非法藏所成之彌陀也古崖謂二師之義皆通慈恩又從容也無量相佛相好無量無量幢佛無量功德高峻如幢大光佛大明佛大光大明並喻佛智自行化他破障除惑寶相佛相好如寶可尊可貴淨光佛智光最淨如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經四北方舍利弗北方世界有𦦨肩佛二智照理如肩發𦦨最勝音佛説法稱機梵音最勝難沮佛內證實相四魔不能沮散日生佛日表智慧從法身生綱明佛智慧如綱覆遍十方如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經五下方舍利弗下方世界有師子佛佛是衆聖之尊故以獸王比之又師子一吼百獸惱裂聞之皆死喻佛説法魔外消亡名聞佛名稱普聞遍十方界名光佛名如日光遍照一切達磨佛達磨翻法約所證説法幢佛以幢表法高大熾盛持法佛以中道法雙持二邊如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經六上方舍利弗上方世界有梵音佛法音清妙聞者悅心宿王佛宿音秀星宿中王佛如北辰居其所而衆星拱之香上佛如薝蔔林中不嗅餘香佛德之香更無過上者香光佛香喻斷德光喻智德二德能顯本有法身亦可德香屬自行光有照明屬化他大𦦨肩佛二智如肩能照如𦦨照理廣大故也雜色寶華嚴身佛自行因華如寶莊嚴果德之身娑羅樹王佛娑羅翻牢固亦翻最勝寶華德佛常樂我淨德如寶華見一切義佛洞見諸法甚深義趣如須彌山佛須彌出衆山之上如佛為衆聖之尊如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經二勸信二初釋經題舍利弗於汝意云何何故名為一切諸佛所護念經佛自徵問經題之義舍利弗若有善男子善女人聞是經受持者釋出聞受持者此三慧也聞即聞慧受謂執受即是思慧持謂任持不忘即修慧也及聞諸佛名者靈芝云聞經受持者牒上二報莊嚴正明行法文也及聞諸佛名者牒上六方引同文也是諸善男子善女人皆為一切諸佛之所護念護謂覆護不使魔撓念謂記念不令退失衆生聞經受持能順佛意故為諸佛所護念也皆得不退轉於阿耨多羅三藐三菩提轉指上聞經念佛或事或理或定或散或淺或深盡證不退故云皆得也阿耨多羅此翻無上三藐翻正等三菩提翻正覺即無上正等正覺此即佛之果號也二正信是故舍利弗汝等皆當信受我語及諸佛所説是故者結上之詞皆當者勸勉之語佛法如大海信為能入如來金口無不實語更引十方果覺誠言其鄭重叮嚀有如此者舍利弗若有人已發願今發願當發願欲生阿彌陀佛國者是諸人等皆得不退轉於阿耨多羅三藐三菩提已即過去今即現在當即未來發願是過現未來求生之因於彼國土若已生若今生若當生生即是生彼之果三因三果分對可知是故舍利弗諸善男子善女人若有信者應當發願生彼國土是故下總結勸欲生淨土者唯恐無願有願必生定無漏失十疑論云生彼國已悉得無生未有一人退落三界為生死業縛等二舉難況易便聞者知歸二初諸佛互讚以況舍利弗如我今者稱讚諸佛不可思議功德彼諸佛等亦稱讚我不可思議功德古崖云若據上科六方之文乃是諸佛出廣長舌同釋迦稱讚彌陀今此却云稱讚諸佛者何耶良以彌陀與諸佛同一身智華嚴經云十方諸如來同共一法身一身一智慧力無畏亦然是故釋迦稱讚彌陀即是稱讚諸佛也又經上文云聞是經受持者及聞諸佛名者亦是稱讚諸佛故今總結也彼諸佛等亦稱讚我者既言諸佛則彌陀亦同諸佛稱讚釋迦也而作是言釋迦牟尼佛能為甚難希有之事釋迦此云能仁牟尼此翻寂默能仁則大悲應物寂默則大智冥理甚難希有事者一於五濁得菩提難二為衆生説此難信法難舉此二難意顯淨土修行之易令聞者知歸求往生也初意者謂此五濁障重而修行人多致退屈唯我釋迦能忍濁惡修行成佛可謂甚難第二意者七日持名下至十念臨終感佛決定往生而獲聖果如此法門在濁惡世為衆生説而令信受可謂甚難能於娑婆國土梵語娑婆此云堪忍以衆生堪忍受三毒故五濁惡世劫濁見濁煩惱濁衆生濁命濁中得阿耨多羅三藐三菩提此明一於五濁得菩提難五濁者有體有相體者劫濁無別體劫是長時剎那是短時但約四濁立此假名衆生濁亦無別體攬見慢果報上立此假名煩惱指五鈍使為體見濁指五利使為體命濁連持色心為體相者四濁增劇聚在此時瞋恚增劇刀兵起貪欲增劇飢饉起愚癡增劇疾疫起三災起故煩惱倍隆諸見轉熾催年減壽衆濁交湊如水奔昏風波鼓怒時使之然是名劫濁相煩惱者貪海納流未嘗飽足瞋蚖吸毒撓諸世間癡暗頑嚚過於漆墨慢高下視陵忽無度疑網無信不可告實是為煩惱濁相見濁者無人謂有人有道謂無道十六知見六十二見等猶如羅網又似稠林纏縛屈曲不能得出是為見濁相衆生濁者攬於色相立一主宰譬如黐膠無物不著流蕩六道處處受生或長或短或貧或富是為衆生濁相命濁者朝生暮殞晝出夕沒波轉煙回瞬息不住是為命濁相衆生濁多不能具説為諸衆生説是一切世間難信之法此明二於五濁為衆生説此難信之法令生信為難意在敦勉修證也二釋迦結難以況舍利弗當知我於五濁惡世行此難事得阿耨多羅三藐三菩提為一切世間説此難信之法是為甚難孤山云五濁行難行而得菩提其事已難復説此難信之法二事兼之是為甚難大本云若聞經信樂受持難中之難無過此難靈芝云念佛法門不擇愚智不擇豪賤不論久近不選善惡唯取決誓猛信臨終惡相十念往生亦是具縛凡夫屠沽下類剎那超越成佛之法可謂一切世間甚為難信也三流通分佛説此經已舍利弗及諸比丘一切世間天人阿修羅等聞佛所説歡喜信受作禮而去一切世間者義該十界別舉三趣者以三善道多受化之機故也又以前列衆望今已該九界雖無畜生一道必有八部在座但是文略以大衆俱兼之唯缺地獄衆或是苦重乘戒俱緩不預法會或一切之言兼之歡喜信受者歡喜則聞法得利信受則修習流通也拔一切業障根本得生淨土神呪宋元嘉年求那跋陀奉制譯南無阿彌多婆夜哆一他伽跢二音剁夜哆地三音豸夜他阿彌唎四音里都婆毗五阿彌唎哆六悉耽婆毗七阿彌唎哆八毗迦蘭諦九阿彌唎哆十毗迦蘭哆十一伽彌膩十二伽伽那十三枳多迦隸十四莎婆訶十五此呪五十九字十五句出彌陀不思議神力傳在養字函世人持誦句字多誤合依藏本今在貞字函若有善男子善女人能誦此呪者阿彌陀佛常住其頂日夜擁無令怨家而得其便現世常得安隱臨命終時任運往生呪字音切哆音掇他逸戈切音柂跢都臥切地宅買切枳音止此經乃極樂之易簡祕書也自唐迄宋慈恩基師孤山圓師淨覺嶽師靈芝照師皆有疏記古崖新師復有集注義釋備矣猶盧道俗未暇詳覽自惟衰耄去日非遙輒取優長分文句解與衆結往生緣匪獵名也至正元年解制日七十七歲苾芻性澄後敘
